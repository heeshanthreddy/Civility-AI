apiVersion: apps/v1
kind: Deployment
metadata:
  name: civility-backend
  labels:
    app: civility-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: civility-backend
  template:
    metadata:
      labels:
        app: civility-backend
    spec:
      containers:
        - name: backend
          image: civility-ai-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: civility-secrets
                  key: anthropic-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
