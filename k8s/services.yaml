apiVersion: v1
kind: Service
metadata:
  name: civility-backend-service
  namespace: civility-ai
  labels:
    app: civility-backend
spec:
  type: ClusterIP
  selector:
    app: civility-backend
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: http
  sessionAffinity: ClientIP
---
apiVersion: v1
kind: Service
metadata:
  name: civility-frontend-service
  namespace: civility-ai
  labels:
    app: civility-frontend
spec:
  type: LoadBalancer
  selector:
    app: civility-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  sessionAffinity: ClientIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: civility-network-policy
  namespace: civility-ai
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: civility-ai
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 80
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: civility-backend-hpa
  namespace: civility-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: civility-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: civility-frontend-hpa
  namespace: civility-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: civility-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
